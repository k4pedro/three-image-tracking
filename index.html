<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>three-image-tracking</title>
</head>

<body>
  <!-- imagens para tracking -->
  <img id="imgMarkerHiro" src="/cavalo.jpg" style="display: none;" />
  <img id="imgNFTEarth" src="/frango.jpg" style="display: none;" />

  <!-- cena 3D -->
  <div id="scene-container"></div>

  <div id="menu"
    class="hidden fixed bottom-10 left-1/2 w-[min(92vw,420px)] -translate-x-1/2 rounded-2xl border border-white/20 bg-black/60 p-4 text-white shadow-2xl backdrop-blur-md">
    <h2 id="menu-title" class="text-base font-semibold leading-tight">
      Produto
    </h2>

    <p id="menu-desc" class="mt-1 text-sm text-white/80">
      Descrição do produto
    </p>

    <div class="mt-3 grid grid-cols-2 gap-2">
      <button id="prev"
        class="rounded-xl bg-white/90 px-4 py-3 text-sm font-semibold text-black shadow active:translate-y-[1px]"
        type="button">
        Anterior
      </button>

      <button id="next"
        class="rounded-xl bg-white px-4 py-3 text-sm font-semibold text-black shadow active:translate-y-[1px]"
        type="button">
        Próximo
      </button>
    </div>
  </div>

  <script type="module" src="/main.js"></script>
</body>

</html>
