<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>three-image-tracking</title>
</head>

<body>
  <img id="imgMarkerHiro" src="/cavalo.jpg" style="display: none;" />
  <img id="imgNFTEarth" src="/frango.jpg" style="display: none;" />
  <div id="scene-container"></div>
  <div id="menu"
    class="hidden fixed bottom-20 left-1/2 w-[min(92vw,420px)] -translate-x-1/2 rounded-2xl border border-white/20 bg-black/60 p-4 text-white shadow-2xl backdrop-blur-md">
    <h2 id="menu-title" class="text-base font-semibold leading-tight">
      Produto
    </h2>
    <p id="menu-desc" class="mt-1 text-sm text-white/80">
      Descrição do produto
    </p>
  </div>
  <div id="nav-ar" class="hidden pointer-events-none fixed inset-0 z-50 flex items-center justify-between px-4">
    <button id="prev" type="button"
      class="pointer-events-auto inline-flex h-12 w-12 items-center justify-center rounded-full bg-black/40 text-white backdrop-blur-md transition hover:bg-black/60 active:scale-95">
      <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m15 18-6-6 6-6" />
      </svg>
    </button>
    <button id="next" type="button"
      class="pointer-events-auto inline-flex h-12 w-12 items-center justify-center rounded-full bg-black/40 text-white backdrop-blur-md transition hover:bg-black/60 active:scale-95">
      <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m9 18 6-6-6-6" />
      </svg>
    </button>
  </div>
  <script type="module" src="/main.js"></script>
</body>
</html>
